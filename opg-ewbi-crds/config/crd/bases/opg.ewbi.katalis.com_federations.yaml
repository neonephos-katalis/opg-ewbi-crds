---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: federations.opg.ewbi.katalis.com
spec:
  group: opg.ewbi.katalis.com
  names:
    kind: Federation
    listKind: FederationList
    plural: federations
    shortNames:
    - fed
    singular: federation
  scope: Namespaced
  versions:
  - name: v1beta1
    schema:
      openAPIV3Schema:
        description: Federation is the Schema for the federations API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: FederationSpec defines the desired state of Federation
            properties:
              capType:
                description: The enumerated list of network capabilities that an OP
                  can use for various services via SBI-NR.
                enum:
                - NW_CAP_CONN_STATE_CHANGE
                - NW_CAP_LOCATION_RETRIEVAL
                - NW_CAP_USERPLANE_MGMT_EVENTS
                - NW_CAP_DYNAMIC_QOS
                type: string
              federationData:
                properties:
                  initialDate:
                    description: Time zone info of the federation initiated by the
                      originating OP
                    format: date-time
                    type: string
                  origOPCountryCode:
                    description: ISO 3166-1 Alpha-2 code for the country of Partner
                      operator
                    pattern: ^[A-Z]{2}$
                    type: string
                  origOPFederationId:
                    description: Globally unique identifier allocated to an operator
                      platform. This is valid and used only in context of MEC federation
                      interface.
                    pattern: ^[A-Za-z0-9][A-Za-z0-9-]*$
                    type: string
                  partnerCallbackCredentials:
                    properties:
                      clientId:
                        pattern: ^[A-Za-z0-9][A-Za-z0-9-]*$
                        type: string
                      clientSecret:
                        pattern: ^[A-Za-z0-9][A-Za-z0-9-]*$
                        type: string
                      tokenUrl:
                        pattern: ^https?://[^\s/$.?#].[^\s]*$
                        type: string
                    required:
                    - clientId
                    - clientSecret
                    - tokenUrl
                    type: object
                  partnerStatusLink:
                    type: string
                required:
                - initialDate
                - partnerStatusLink
                type: object
              fixedNetworkIds:
                items:
                  description: List of network identifier associated with the fixedline
                    network of the operator platform.
                  type: string
                minItems: 1
                type: array
              mobileNetworkIds:
                properties:
                  mcc:
                    pattern: ^\d{3}$
                    type: string
                  mncs:
                    items:
                      pattern: ^\d{2,3}$
                      type: string
                    minItems: 1
                    type: array
                type: object
              updateData:
                properties:
                  assocAppPolicies:
                    properties:
                      appIdList:
                        description: AppIdLocList
                        properties:
                          appId:
                            description: (AppIdentifier) Identifier used to refer
                              to an application.
                            pattern: ^[A-Za-z][A-Za-z0-9_]{7,63}$
                            type: string
                          appProvId:
                            description: (AppProviderId) UserId of the app provider.  Identifier
                              is relevant only in context of this federation.
                            pattern: ^[A-Za-z][A-Za-z0-9_]{7,63}$
                            type: string
                          zoneIds:
                            items:
                              description: (ZoneIdentifier) Human readable name of
                                the zone.
                              pattern: ^[A-Za-z0-9][A-Za-z0-9-]*$
                              type: string
                            minItems: 1
                            type: array
                        required:
                        - appId
                        - appProvId
                        type: object
                      policyId:
                        description: (ApplPolicyIdentifier) Application-level Policy
                          unique identifier"
                        pattern: ^[A-Za-z][A-Za-z0-9_]{7,63}$
                        type: string
                    required:
                    - appIdList
                    - policyId
                    type: object
                  assocOpsPolicies:
                    properties:
                      appIdList:
                        description: AppIdLocList
                        properties:
                          appId:
                            description: (AppIdentifier) Identifier used to refer
                              to an application.
                            pattern: ^[A-Za-z][A-Za-z0-9_]{7,63}$
                            type: string
                          appProvId:
                            description: (AppProviderId) UserId of the app provider.  Identifier
                              is relevant only in context of this federation.
                            pattern: ^[A-Za-z][A-Za-z0-9_]{7,63}$
                            type: string
                          zoneIds:
                            items:
                              description: (ZoneIdentifier) Human readable name of
                                the zone.
                              pattern: ^[A-Za-z0-9][A-Za-z0-9-]*$
                              type: string
                            minItems: 1
                            type: array
                        required:
                        - appId
                        - appProvId
                        type: object
                      policyId:
                        description: (ApplPolicyIdentifier) Application-level Policy
                          unique identifier"
                        pattern: ^[A-Za-z][A-Za-z0-9_]{7,63}$
                        type: string
                    required:
                    - appIdList
                    - policyId
                    type: object
                  modificationDate:
                    description: Date and time of the federation modification by the
                      originating partner OP
                    format: date-time
                    type: string
                  objectType:
                    enum:
                    - MOBILE_NETWORK_CODES
                    - FIXED_NETWORK_CODES
                    - OPS_POLICY
                    - APP_POLICY
                    type: string
                  operationType:
                    enum:
                    - ADD_CODES
                    - REMOVE_CODES
                    - UPDATE_CODES
                    - ADD_POLICY
                    - REMOVE_POLICY
                    - UPDATE_POLICY
                    type: string
                type: object
            type: object
          status:
            description: FederationStatus defines the observed state of Federation.
            properties:
              caps:
                properties:
                  capabilityId:
                    description: The enumerated list of network capabilities that
                      an OP can use for various services via SBI-NR.
                    enum:
                    - NW_CAP_CONN_STATE_CHANGE
                    - NW_CAP_LOCATION_RETRIEVAL
                    - NW_CAP_USERPLANE_MGMT_EVENTS
                    - NW_CAP_DYNAMIC_QOS
                    type: string
                  locationAccuracy:
                    description: The enumerated list of type of network location of
                      an UE that an OP can determine via SBI-NR.
                    enum:
                    - LAST_KNOWN_LOCATION
                    - CURRENT_LOCATION
                    - INITIAL_LOCATION
                    type: string
                  locationType:
                    description: The enumerated list of UE location accuracy that
                      an OP can determine via SBI-NR.
                    enum:
                    - CELL_LEVEL_ACCURACY
                    - REGISTRATION_AREA_ACCURACY
                    - TRACKING_AREA_ACCURACY
                    - GEO_LOCATION_ACCURACY
                    type: string
                  maxUserPlaneLatency:
                    description: Indicates the maximum user plane latency in units
                      of milliseconds to decide whether edge relocation is needed
                      to ascertain latency remain in this range.
                    type: string
                  maxiDetectionTime:
                    description: The maximum detection time in seconds that the OP
                      can determine the UE change of connectivity with the mobile
                      network.
                    type: string
                  supportedQoS:
                    description: Set of one or more 5G QoS Identifier (5QI or 4G QCI)
                      created via concatanation of Resource Type and 5QI values i.e.,
                      GBR1, GBR2, GBR65, NONGBR79 etc.
                    type: string
                required:
                - capabilityId
                - locationType
                - maxUserPlaneLatency
                - maxiDetectionTime
                - supportedQoS
                type: object
              federationContextId:
                description: This identifier shall be provided by the partner OP on
                  successful verification and validation of the federation create
                  request and is used by partner op to identify this newly created
                  federation context. Originating OP shall provide this identifier
                  in any subsequent request towards the partner op.
                pattern: ^[A-Za-z0-9][A-Za-z0-9-]*$
                type: string
              federationExpiryDate:
                description: Date and Time zone info of the existing federation expiry
                format: date-time
                type: string
              federationHealthInfo:
                properties:
                  dateAndTimeZoneObject:
                    description: Date and Time zone info format
                    format: date-time
                    type: string
                  numOfAcceptedZones:
                    type: string
                  numOfActiveAlarms:
                    type: string
                  numOfApplications:
                    type: string
                  status:
                    properties:
                      alarmState:
                        description: Defines the alarm state during its life cycle
                          (raised | updated | cleared).
                        enum:
                        - RAISED
                        - UPDATED
                        - CLEAR
                        type: string
                    required:
                    - alarmState
                    type: object
                required:
                - dateAndTimeZoneObject
                - numOfAcceptedZones
                - status
                type: object
              federationRenewalDate:
                description: Date and Time zone info of the existing federation renewal.
                  Shall be less than federationExpiryDate
                format: date-time
                type: string
              fixedNetworkIds:
                description: (FixedNetworkIds) List of network identifier associated
                  with the fixed line network of the operator platform.
                items:
                  type: string
                minItems: 1
                type: array
              mobileNetworkIds:
                description: MobileNetworkIds
                properties:
                  mcc:
                    pattern: ^\d{3}$
                    type: string
                  mncs:
                    items:
                      pattern: ^\d{2,3}$
                      type: string
                    minItems: 1
                    type: array
                type: object
              partnerOPCountryCode:
                description: (CountryCode) ISO 3166-1 Alpha-2 code for the country
                  of Partner operator
                pattern: ^[A-Z]{2}$
                type: string
              partnerOPFederationId:
                description: (FederationIdentifier) Globally unique identifier allocated
                  to an operator platform. This is valid and used only in context
                  of MEC federation interface.
                pattern: ^[A-Za-z0-9][A-Za-z0-9-]*$
                type: string
              platformCaps:
                description: Home routing - Operator platform is capable of routing
                  edge application data traffic from its edges to user device in their
                  home location. This is the case where user devices are served in
                  their home region (requesting platform region, non-roaming) but
                  the corresponding edge application are in operator platform edges.
                  Anchoring - Operator platform is capable of routing edge application
                  traffic for roaming user devices to edge application in user device
                  home network. Service APIs - Capability to handle Service APIs (e.g.,
                  CAMARA APIs) from the Leading OP
                items:
                  enum:
                  - homeRouting
                  - Anchoring
                  - serviceAPIs
                  - faultMgmt
                  - eventMgmt
                  - resourceMonitor
                  - networkEventMgmt
                  - appNotificationMgmt
                  - appLevelPolicyMgmt
                  - opsLevelPolicyMgmt
                  type: string
                type: array
              service:
                properties:
                  apiRoutingInfo:
                    description: (serviceRoutingInfo) List of public IP addresses
                      MNO manages for UEs to connect with public data networks
                    items:
                      pattern: ^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\\/([0-9]|[1-2][0-9]|3[0-2]))?$
                      type: string
                    minItems: 1
                    type: array
                  serviceCaps:
                    description: (serviceAPINames) List of Service API capability
                      names an OP supports and offers to other OPs "quality_on_demand",
                      "device_location" etc.
                    items:
                      enum:
                      - QualityOnDemand
                      - DeviceLocation
                      - DeviceStatus
                      - SimSwap
                      - NumberVerification
                      - DeviceIdentifier
                      type: string
                    minItems: 1
                    type: array
                  serviceType:
                    description: An identifier to refer to partner OP capabilities
                      for application providers.
                    enum:
                    - api_federation
                    type: string
                type: object
              serviceEndpoint:
                description: Service Endpoint
                properties:
                  endpointType:
                    enum:
                    - edge
                    - lcm
                    type: string
                  fqdn:
                    description: (EdgeAppFQDN) DNS FQDN assigned to application instances
                      in an availability zone. User Clients can resolve the FQDN to
                      communicate with the edge instances of the application
                    type: string
                  ipv4Addresses:
                    items:
                      pattern: ^(([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])$
                      type: string
                    minItems: 1
                    type: array
                  ipv6Addresses:
                    items:
                      type: string
                    minItems: 1
                    type: array
                  port:
                    minimum: 0
                    type: integer
                required:
                - endpointType
                - port
                type: object
              zoneDetails:
                items:
                  properties:
                    geographyDetails:
                      description: Details about cities or state covered by the edge.
                        Details about the type of locality for eg rural, urban, industrial
                        etc. This information is defined in human readable form.
                      type: string
                    geolocation:
                      description: Latitude,Longitude as decimal fraction up to 4
                        digit precision
                      pattern: ^([-+]?)([\d]{1,2})((((\.)([\d]{1,4}))?(,)))(([-+]?)([\d]{1,3})((\.)([\d]{1,4}))?)$
                      type: string
                    zoneId:
                      pattern: ^[A-Za-z0-9][A-Za-z0-9-]*$
                      type: string
                  required:
                  - geographyDetails
                  - zoneId
                  type: object
                minItems: 1
                type: array
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
