---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: federations.opg.ewbi.katalis.com
spec:
  group: opg.ewbi.katalis.com
  names:
    kind: Federation
    listKind: FederationList
    plural: federations
    shortNames:
    - fed
    singular: federation
  scope: Namespaced
  versions:
  - name: v1beta1
    schema:
      openAPIV3Schema:
        description: Federation is the Schema for the federations API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: FederationSpec defines the desired state of Federation
            properties:
              capType:
                enum:
                - NW_CAP_CONN_STATE_CHANGE
                - NW_CAP_LOCATION_RETRIEVAL
                - NW_CAP_USERPLANE_MGMT_EVENTS
                - NW_CAP_DYNAMIC_QOS
                type: string
              federationData:
                properties:
                  initialDate:
                    format: date-time
                    type: string
                  origOPCountryCode:
                    pattern: ^[A-Z]{2}$
                    type: string
                  origOPFederationId:
                    pattern: ^[A-Za-z0-9][A-Za-z0-9-]*$
                    type: string
                  partnerCallbackCredentials:
                    properties:
                      clientId:
                        pattern: ^[A-Za-z0-9][A-Za-z0-9-]*$
                        type: string
                      clientSecret:
                        pattern: ^[A-Za-z0-9][A-Za-z0-9-]*$
                        type: string
                      tokenUrl:
                        pattern: ^https?://[^\s/$.?#].[^\s]*$
                        type: string
                    required:
                    - clientId
                    - clientSecret
                    - tokenUrl
                    type: object
                  partnerStatusLink:
                    type: string
                required:
                - initialDate
                - partnerStatusLink
                type: object
              fixedNetworkIds:
                items:
                  type: string
                minItems: 1
                type: array
              mobileNetworkIds:
                properties:
                  mcc:
                    pattern: ^\d{3}$
                    type: string
                  mncs:
                    items:
                      type: string
                    minItems: 1
                    type: array
                type: object
              updateData:
                properties:
                  assocAppPolicies:
                    properties:
                      appIdList:
                        properties:
                          appId:
                            pattern: ^[A-Za-z][A-Za-z0-9_]{7,63}$
                            type: string
                          appProvId:
                            pattern: ^[A-Za-z][A-Za-z0-9_]{7,63}$
                            type: string
                          zoneIds:
                            items:
                              type: string
                            minItems: 1
                            type: array
                        required:
                        - appId
                        - appProvId
                        type: object
                      policyId:
                        pattern: ^[A-Za-z][A-Za-z0-9_]{7,63}$
                        type: string
                    required:
                    - appIdList
                    - policyId
                    type: object
                  assocOpsPolicies:
                    properties:
                      appIdList:
                        properties:
                          appId:
                            pattern: ^[A-Za-z][A-Za-z0-9_]{7,63}$
                            type: string
                          appProvId:
                            pattern: ^[A-Za-z][A-Za-z0-9_]{7,63}$
                            type: string
                          zoneIds:
                            items:
                              type: string
                            minItems: 1
                            type: array
                        required:
                        - appId
                        - appProvId
                        type: object
                      policyId:
                        pattern: ^[A-Za-z][A-Za-z0-9_]{7,63}$
                        type: string
                    required:
                    - appIdList
                    - policyId
                    type: object
                  modificationDate:
                    format: date-time
                    type: string
                  objectType:
                    enum:
                    - MOBILE_NETWORK_CODES
                    - FIXED_NETWORK_CODES
                    - OPS_POLICY
                    - APP_POLICY
                    type: string
                  operationType:
                    enum:
                    - ADD_CODES
                    - REMOVE_CODES
                    - UPDATE_CODES
                    - ADD_POLICY
                    - REMOVE_POLICY
                    - UPDATE_POLICY
                    type: string
                type: object
            type: object
          status:
            description: FederationStatus defines the observed state of Federation.
            properties:
              caps:
                properties:
                  capabilityId:
                    enum:
                    - NW_CAP_CONN_STATE_CHANGE
                    - NW_CAP_LOCATION_RETRIEVAL
                    - NW_CAP_USERPLANE_MGMT_EVENTS
                    - NW_CAP_DYNAMIC_QOS
                    type: string
                  locationAccuracy:
                    enum:
                    - LAST_KNOWN_LOCATION
                    - CURRENT_LOCATION
                    - INITIAL_LOCATION
                    type: string
                  locationType:
                    enum:
                    - CELL_LEVEL_ACCURACY
                    - REGISTRATION_AREA_ACCURACY
                    - TRACKING_AREA_ACCURACY
                    - GEO_LOCATION_ACCURACY
                    type: string
                  maxUserPlaneLatency:
                    type: string
                  maxiDetectionTime:
                    type: string
                  supportedQoS:
                    type: string
                required:
                - capabilityId
                - locationType
                - maxUserPlaneLatency
                - maxiDetectionTime
                - supportedQoS
                type: object
              federationContextId:
                pattern: ^[A-Za-z0-9][A-Za-z0-9-]*$
                type: string
              federationExpiryDate:
                format: date-time
                type: string
              federationHealthInfo:
                properties:
                  dateAndTimeZoneObject:
                    format: date-time
                    type: string
                  numOfAcceptedZones:
                    type: string
                  numOfActiveAlarms:
                    type: string
                  numOfApplications:
                    type: string
                  status:
                    properties:
                      alarmState:
                        enum:
                        - RAISED
                        - UPDATED
                        - CLEAR
                        type: string
                    required:
                    - alarmState
                    type: object
                required:
                - dateAndTimeZoneObject
                - numOfAcceptedZones
                - status
                type: object
              federationRenewalDate:
                format: date-time
                type: string
              fixedNetworkIds:
                items:
                  type: string
                minItems: 1
                type: array
              mobileNetworkIds:
                properties:
                  mcc:
                    pattern: ^\d{3}$
                    type: string
                  mncs:
                    items:
                      type: string
                    minItems: 1
                    type: array
                type: object
              partnerOPCountryCode:
                pattern: ^[A-Z]{2}$
                type: string
              partnerOPFederationId:
                pattern: ^[A-Za-z0-9][A-Za-z0-9-]*$
                type: string
              platformCaps:
                items:
                  type: string
                type: array
              service:
                properties:
                  apiRoutingInfo:
                    items:
                      type: string
                    minItems: 1
                    type: array
                  serviceCaps:
                    items:
                      type: string
                    minItems: 1
                    type: array
                  serviceType:
                    enum:
                    - api_federation
                    type: string
                type: object
              serviceEndpoint:
                properties:
                  endpointType:
                    enum:
                    - edge
                    - lcm
                    type: string
                  fqdn:
                    type: string
                  ipv4Addresses:
                    items:
                      pattern: ^(([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])$
                      type: string
                    minItems: 1
                    type: array
                  ipv6Addresses:
                    items:
                      type: string
                    minItems: 1
                    type: array
                  port:
                    format: int32
                    minimum: 0
                    type: integer
                required:
                - endpointType
                - port
                type: object
              zoneDetails:
                items:
                  properties:
                    geographyDetails:
                      type: string
                    geolocation:
                      pattern: ^([-+]?)([\d]{1,2})((((\.)([\d]{1,4}))?(,)))(([-+]?)([\d]{1,3})((\.)([\d]{1,4}))?)$
                      type: string
                    zoneId:
                      pattern: ^[A-Za-z0-9][A-Za-z0-9-]*$
                      type: string
                  required:
                  - geographyDetails
                  - zoneId
                  type: object
                minItems: 1
                type: array
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
