---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: images.opg.ewbi.katalis.com
spec:
  group: opg.ewbi.katalis.com
  names:
    kind: Image
    listKind: ImageList
    plural: images
    shortNames:
    - imgman
    singular: image
  scope: Namespaced
  versions:
  - name: v1beta1
    schema:
      openAPIV3Schema:
        description: Image is the Schema for the images API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ImageSpec defines the desired state of Image
            properties:
              federationContextId:
                description: This identifier shall be provided by the partner OP on
                  successful verification and validation of the federation create
                  request and is used by partner op to identify this newly created
                  federation context. Originating OP shall provide this identifier
                  in any subsequent request towards the partner op.
                pattern: ^[A-Za-z0-9][A-Za-z0-9-]*$
                type: string
              imageBody:
                properties:
                  appProviderId:
                    description: UserId of the app provider. Identifier is relevant
                      only in context of this federation.
                    pattern: ^[A-Za-z][A-Za-z0-9_]{7,63}$
                    type: string
                  checksum:
                    description: MD5 checksum for VM and image-based images, sha256
                      digest for containers
                    type: string
                  image:
                    format: byte
                    type: string
                  imageDescription:
                    description: Brief description about the image.
                    maxLength: 128
                    minLength: 8
                    type: string
                  imageName:
                    description: Name of the image.   App provides specifies this
                      name when image is uploaded on originating OP over NBI.
                    pattern: ^[A-Za-z][A-Za-z0-9_]{7,31}$
                    type: string
                  imageRepoLocation:
                    items:
                      properties:
                        password:
                          description: Password to access the repository
                          type: string
                        repoURL:
                          type: string
                        token:
                          description: Authorization token to access the repository
                          type: string
                        userName:
                          description: Username to access the repository
                          type: string
                      type: object
                    type: array
                  imageType:
                    description: Indicate if the image is Container image or VM image
                      (QCOW2, OVA)
                    enum:
                    - QCOW2
                    - DOCKER
                    - OVA
                    type: string
                  imageVersionInfo:
                    description: Image version information.
                    type: string
                  imgInsSetArch:
                    description: CPU Instruction Set Architecture (ISA) E.g., Intel,
                      Arm etc.
                    enum:
                    - ISA_X86_64
                    - ISA_ARM_64
                    type: string
                  imgOSType:
                    properties:
                      architecture:
                        enum:
                        - x86_64
                        - x86
                        type: string
                      distribution:
                        enum:
                        - RHEL
                        - UBUNTU
                        - COREOS
                        - FEDORA
                        - WINDOWS
                        - OTHER
                        type: string
                      license:
                        enum:
                        - OS_LICENSE_TYPE_FREE
                        - OS_LICENSE_TYPE_ON_DEMAND
                        - NOT_SPECIFIED
                        type: string
                      version:
                        enum:
                        - OS_VERSION_UBUNTU_2204_LTS
                        - OS_VERSION_RHEL_8
                        - OS_VERSION_RHEL_7
                        - OS_VERSION_DEBIAN_11
                        - OS_VERSION_COREOS_STABLE
                        - OS_MS_WINDOWS_2012_R2
                        - OTHER
                        type: string
                    required:
                    - architecture
                    - distribution
                    - license
                    - version
                    type: object
                  repoType:
                    description: Image repository location. PUBLICREPO is used of
                      public URLs like GitHub, Helm repo, docker registry etc., PRIVATEREPO
                      is used for private repo managed by the application developer,
                      UPLOAD is for the case when image is uploaded from MEC web portal.  OP
                      should pull the image from ‘repoUrl' immediately after receiving
                      the request and then send back the response. In case the repoURL
                      corresponds to a docker registry, use docker v2 http api to
                      do the pull.
                    enum:
                    - PRIVATEREPO
                    - PUBLICREPO
                    - UPLOAD
                    type: string
                required:
                - appProviderId
                - imageName
                - imageType
                - imageVersionInfo
                - imgInsSetArch
                - imgOSType
                type: object
              imageId:
                description: A globally unique identifier associated with the image.
                  Originating OP generates this identifier when image is uploaded
                  over NBI.
                format: uuid
                type: string
            required:
            - federationContextId
            - imageId
            type: object
          status:
            description: ImageStatus defines the observed state of Image.
            properties:
              lastUpdated:
                description: Timestamp of the last status update
                format: date-time
                type: string
              message:
                description: Message indicating details about the current state
                type: string
              state:
                description: Current state of the artefact upload
                enum:
                - Pending
                - Uploading
                - Uploaded
                - Failed
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
