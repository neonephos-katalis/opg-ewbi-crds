---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: applicationdeployments.opg.ewbi.katalis.com
spec:
  group: opg.ewbi.katalis.com
  names:
    kind: ApplicationDeployment
    listKind: ApplicationDeploymentList
    plural: applicationdeployments
    shortNames:
    - appdep
    singular: applicationdeployment
  scope: Namespaced
  versions:
  - name: v1beta1
    schema:
      openAPIV3Schema:
        description: ApplicationDeployment is the Schema for the applicationdeployments
          API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ApplicationDeploymentSpec defines the desired state of ApplicationDeployment
            properties:
              appDetails:
                description: AppDetails defines the application details
                properties:
                  appInstCallbackLink:
                    type: string
                  appVersion:
                    description: Version info of the application
                    type: string
                  zoneInfo:
                    description: ZoneInfo defines the zone information for the application
                    properties:
                      flavourId:
                        description: An identifier to refer to a specific combination
                          of compute resources
                        type: string
                      resPool:
                        description: Resource pool to be used for application instantiation
                          on this zone.  Valid only if IE 'resourceConsumption' is
                          set to 'RESERVED_RES_SHALL' or 'RESERVED_RES_PREFER'
                        pattern: ^[A-Za-z0-9][A-Za-z0-9_]{6,30}[A-Za-z0-9]$
                        type: string
                      resourceConsumption:
                        default: RESERVED_RES_AVOID
                        description: Specifies if the application can be instantiated
                          using pre-reserved resource or not.  App provider can pre-reserve
                          a pool of compute resource on each zone.  'RESERVED_RES_SHALL'
                          instruct OP to use only the pre-reserved resources. 'RESERVED_RES_PREFER'
                          instruct to first try using pre-reserved resource, if none
                          available go for non-reserved resources. 'RESERVED_RES_AVOID'
                          instruct OP not to use pre-reserved resource if possible,
                          it is a choice depending upon circumstances 'RESERVED_RES_FORBID'
                          instruct OP not to use pre-reserved resources.
                        enum:
                        - RESERVED_RES_SHALL
                        - RESERVED_RES_PREFER
                        - RESERVED_RES_AVOID
                        - RESERVED_RES_FORBID
                        type: string
                    type: object
                type: object
              appId:
                description: Identifier used to refer to an application.
                pattern: ^[A-Za-z][A-Za-z0-9_]{7,63}$
                type: string
              appInstanceId:
                description: Unique identifier generated by the partner OP to identify
                  an instance of the application on a specific zone.
                pattern: ^[A-Za-z0-9][A-Za-z0-9_]{6,62}[A-Za-z0-9]$
                type: string
              appProviderId:
                description: UserId of the app provider.  Identifier is relevant only
                  in context of this federation.
                pattern: ^[A-Za-z][A-Za-z0-9_]{7,63}$
                type: string
              federationContextId:
                description: This identifier shall be provided by the partner OP on
                  successful verification and validation of the federation create
                  request and is used by partner op to identify this newly created
                  federation context. Originating OP shall provide this identifier
                  in any subsequent request towards the partner op.
                pattern: ^[A-Za-z0-9][A-Za-z0-9-]*$
                type: string
              transactionId:
                description: A unique transaction id for this request in UUID format.
                  It is used for tracking the request
                format: uuid
                type: string
              zoneId:
                description: Human readable name of the zone.
                pattern: ^[A-Za-z0-9][A-Za-z0-9-]*$
                type: string
            required:
            - federationContextId
            type: object
          status:
            description: ApplicationDeploymentStatus defines the observed state of
              ApplicationDeployment.
            properties:
              accessPointInfo:
                description: Information about the IP and Port exposed by the OP.
                  Application clients shall use these access points to reach this
                  application instance
                items:
                  properties:
                    accessPoints:
                      properties:
                        fqdn:
                          description: DNS FQDN assigned to application instances
                            in an availability zone. User Clients can resolve the
                            FQDN to communicate with the edge instances of the application
                          type: string
                        ipv4Addresses:
                          items:
                            pattern: ^(([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])$
                            type: string
                          minItems: 1
                          type: array
                        ipv6Addresses:
                          description: 'Nota: Le regole pattern ''allOf'' originali
                            andranno verificate tramite Webhook.'
                          items:
                            type: string
                          minItems: 1
                          type: array
                        port:
                          minimum: 0
                          type: integer
                      required:
                      - port
                      type: object
                    interfaceId:
                      description: This is the interface identifier that app provider
                        defines when application is onboarded.
                      pattern: ^[A-Za-z0-9][A-Za-z0-9_]{6,30}[A-Za-z0-9]$
                      type: string
                  required:
                  - accessPoints
                  - interfaceId
                  type: object
                minItems: 1
                type: array
              appInstanceInfo:
                items:
                  properties:
                    appInstIdentifier:
                      description: Unique identifier generated by the partner OP to
                        identify an instance of the application on a specific zone.
                      pattern: ^[A-Za-z0-9][A-Za-z0-9_]{6,62}[A-Za-z0-9]$
                      type: string
                    appInstanceState:
                      description: Running status of the application instance.
                      enum:
                      - PENDING
                      - READY
                      - FAILED
                      - TERMINATING
                      type: string
                  required:
                  - appInstIdentifier
                  - appInstanceState
                  type: object
                minItems: 1
                type: array
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
