  name: applicationdeployments.opg.ewbi.katalis.com
spec:
  group: opg.ewbi.katalis.com
  names:
    kind: ApplicationDeployment
    listKind: ApplicationDeploymentList
    plural: applicationdeployments
    shortNames:
    - deploy
    singular: applicationdeployment
  scope: Namespaced
  versions:
  - name: v1beta1
    schema:
      openAPIV3Schema:
        description: ApplicationDeployment is the Schema for the applicationdeployments
          API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ApplicationDeploymentSpec defines the desired state of ApplicationDeployment
            properties:
              appDetails:
                description: AppDetails definisce i dettagli dell'applicazione
