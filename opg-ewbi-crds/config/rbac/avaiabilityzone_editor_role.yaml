# This rule is not used by the project opg-ewbi-crds itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the opg.ewbi.katalis.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: opg-ewbi-crds
    app.kubernetes.io/managed-by: kustomize
  name: availabilityzone-editor-role
rules:
- apiGroups:
  - opg.ewbi.katalis.com
  resources:
  - availabilityzones
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - opg.ewbi.katalis.com
  resources:
  - availabilityzones/status
  verbs:
  - get
